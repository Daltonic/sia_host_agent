<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SiaHost Agent · Agentic Automation for Sia Hosts v1.0</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #070a10;
        font-family: 'DM Sans', sans-serif;
        color: #e8eeff;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 60% 40% at 10% 20%,
            rgba(6, 255, 165, 0.05) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 35% at 90% 80%,
            rgba(0, 212, 255, 0.05) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 70% 50% at 50% 50%,
            rgba(167, 139, 250, 0.03) 0%,
            transparent 70%
          );
      }

      /* TOPBAR */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 300;
        height: 52px;
        background: rgba(7, 10, 16, 0.97);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 5px 12px 5px 9px;
      }
      .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #06ffa5;
        animation: blink 2s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
          box-shadow:
            0 0 8px #06ffa5,
            0 0 16px #06ffa544;
        }
        50% {
          opacity: 0.35;
          box-shadow: none;
        }
      }
      .brand-name {
        font-size: 13px;
        font-weight: 700;
        color: #f0f4ff;
        letter-spacing: -0.02em;
      }
      .brand-ver {
        font-family: 'DM Mono', monospace;
        font-size: 8px;
        background: rgba(6, 255, 165, 0.15);
        color: #06ffa5;
        border: 1px solid rgba(6, 255, 165, 0.35);
        border-radius: 4px;
        padding: 2px 6px;
        margin-left: 2px;
      }
      .brand-sub {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.12em;
      }
      .topbar-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .ctrl-btn {
        font-family: 'DM Mono', monospace;
        font-size: 8px;
        letter-spacing: 0.08em;
        padding: 6px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.38);
        cursor: pointer;
        transition: all 0.18s;
        white-space: nowrap;
      }
      .ctrl-btn:hover {
        color: rgba(255, 255, 255, 0.8);
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.06);
      }
      .ctrl-play {
        background: rgba(6, 255, 165, 0.08);
        color: #06ffa5;
        border-color: rgba(6, 255, 165, 0.28);
      }
      .ctrl-play:hover {
        background: rgba(6, 255, 165, 0.16);
        border-color: rgba(6, 255, 165, 0.55);
      }
      .ctrl-play.playing {
        background: rgba(245, 200, 66, 0.1);
        color: #f5c842;
        border-color: rgba(245, 200, 66, 0.32);
      }

      /* STAGE */
      #stage {
        position: fixed;
        inset: 52px 0 56px 0;
        overflow: hidden;
        z-index: 1;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #stage.mode-select {
        cursor: default;
      }
      #stage.mode-pan {
        cursor: grab;
      }
      #stage.mode-pan.panning {
        cursor: grabbing;
      }
      #canvas-root {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
      }
      #scroll-area {
        position: relative;
        width: 1780px;
        min-height: 1200px;
        padding: 14px 28px 14px 4px;
      }
      #xlink-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 6;
        overflow: visible;
      }

      /* MANDATORY SWIMLANE STRUCTURE */
      .lane-row {
        display: flex;
        align-items: stretch;
        margin: 0 0 14px 0;
        animation: fadeSlide 0.5s ease both;
      }
      .lane-row:nth-child(2) {
        animation-delay: 0.05s;
      }
      .lane-row:nth-child(3) {
        animation-delay: 0.12s;
      }
      .lane-row:nth-child(4) {
        animation-delay: 0.19s;
      }
      .lane-row:nth-child(5) {
        animation-delay: 0.26s;
      }
      .lane-row:nth-child(6) {
        animation-delay: 0.33s;
      }
      .lane-row:nth-child(7) {
        animation-delay: 0.4s;
      }
      .lane-row:nth-child(8) {
        animation-delay: 0.47s;
      }
      .lane-row:nth-child(9) {
        animation-delay: 0.54s;
      }
      .lane-row:nth-child(10) {
        animation-delay: 0.61s;
      }
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateX(-28px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .lane-gutter {
        width: 72px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8px 0;
        overflow: hidden;
        gap: 6px;
      }
      .lane-num {
        font-family: 'DM Mono', monospace;
        font-size: 8px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.5;
        user-select: none;
        flex-shrink: 0;
      }
      .lane-label {
        font-family: 'DM Mono', monospace;
        font-size: 7px;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        white-space: nowrap;
        user-select: none;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: rotate(180deg);
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-height: 0;
      }
      .swimlane {
        flex: 1;
        position: relative;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 18px 16px;
        display: flex;
        align-items: center;
      }
      .lane-nodes {
        display: flex;
        align-items: center;
        gap: 0;
        flex-wrap: nowrap;
      }

      /* INLINE ARROWS */
      .inline-arrow {
        width: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* NODE CARDS — MANDATORY BLUR-FREE */
      .fnode {
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.2s;
        flex-shrink: 0;
      }
      .fnode.dimmed {
        opacity: 0.14;
        pointer-events: none;
      }
      .fnode.lit {
        opacity: 1;
      }
      .fnode-inner {
        width: 130px;
        background: rgba(14, 18, 28, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 10px 10px 8px;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          border-color 0.2s;
        position: relative;
        overflow: hidden;
        transform: translateZ(0);
      }
      .fnode-inner::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04),
          transparent
        );
        pointer-events: none;
      }
      .fnode:hover .fnode-inner,
      .fnode.active .fnode-inner {
        border-color: currentColor;
        box-shadow:
          0 0 0 1px currentColor,
          0 8px 28px -4px currentColor;
        transform: translateZ(0) translateY(-4px);
      }
      .mode-pan .fnode {
        cursor: inherit;
      }
      .mode-pan .fnode:hover .fnode-inner {
        transform: translateZ(0);
        box-shadow: none;
        border-color: rgba(255, 255, 255, 0.07);
      }
      .fnode-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 7px;
        position: relative;
      }
      .fnode-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        font-family: 'DM Mono', monospace;
        font-size: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        font-weight: 600;
        color: #070a10;
      }
      .fnode-name {
        font-size: 10.5px;
        font-weight: 600;
        line-height: 1.25;
        color: #e8eeff;
      }
      .fnode-type {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        color: rgba(232, 238, 255, 0.28);
        margin-top: 3px;
      }

      /* XLINKS */
      .xconn {
        fill: none;
        stroke-linecap: round;
        opacity: 0.22;
        stroke-width: 1.5;
        stroke-dasharray: 6 4;
        animation: dash-travel 3s linear infinite;
        transition:
          opacity 0.3s,
          stroke-width 0.3s;
      }
      .xconn.active {
        opacity: 1;
        stroke-width: 2.5;
        animation: dash-travel 1s linear infinite;
      }
      .xconn.dimmed {
        opacity: 0.04;
      }
      @keyframes dash-travel {
        from {
          stroke-dashoffset: 32;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      .xconn-label-bg {
        opacity: 0;
        transition: opacity 0.3s;
      }
      .xconn-label {
        opacity: 0;
        transition: opacity 0.3s;
        font-family: 'DM Mono', monospace;
        font-size: 8px;
      }
      .xconn-group:hover .xconn-label-bg,
      .xconn-group.active .xconn-label-bg {
        opacity: 1;
      }
      .xconn-group:hover .xconn-label,
      .xconn-group.active .xconn-label {
        opacity: 1;
      }

      /* PACKETS */
      .pkt {
        position: fixed;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      /* FLOW TRAY */
      .flow-tray {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        z-index: 200;
        background: rgba(7, 10, 16, 0.97);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 0 16px;
      }
      .f-chip {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        letter-spacing: 0.07em;
        padding: 5px 12px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 20px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.2);
        transition: all 0.18s;
        white-space: nowrap;
      }
      .f-chip:hover {
        color: rgba(255, 255, 255, 0.6);
        border-color: rgba(255, 255, 255, 0.18);
      }
      .f-chip.on {
        box-shadow: 0 0 12px rgba(6, 255, 165, 0.15);
      }

      /* TETHER */
      #pop-tether {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 499;
        overflow: visible;
      }

      /* MANDATORY BLUR-FREE RENDERING */
      .topbar,
      .vp-toolbar {
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .popover {
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
      }
      .flow-tray,
      .legend,
      #zoom-toast {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      /* POPOVER */
      .popover {
        position: fixed;
        width: 364px;
        background: rgba(9, 13, 22, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(255, 255, 255, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        z-index: 500;
        animation: pop-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        overflow: hidden;
      }
      .popover.dragging {
        animation: none;
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.9),
          0 0 0 1px rgba(255, 255, 255, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        cursor: grabbing !important;
      }
      @keyframes pop-in {
        from {
          opacity: 0;
          transform: scale(0.85) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .pop-header {
        position: relative;
        cursor: grab;
        padding-top: 18px;
        user-select: none;
      }
      .pop-header:active {
        cursor: grabbing;
      }
      .pop-drag-hint {
        position: absolute;
        top: 7px;
        left: 50%;
        transform: translateX(-50%);
        width: 32px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.12);
        pointer-events: none;
        transition: background 0.2s;
      }
      .pop-header:hover .pop-drag-hint {
        background: rgba(255, 255, 255, 0.22);
      }
      .pop-header-inner {
        padding: 4px 14px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .pop-ico {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .pop-nm {
        font-size: 13.5px;
        font-weight: 700;
        color: #f0f4ff;
        line-height: 1.2;
      }
      .pop-tp {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-top: 3px;
        opacity: 0.42;
      }
      .pop-x {
        margin-left: auto;
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: rgba(255, 255, 255, 0.35);
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.18s;
        flex-shrink: 0;
      }
      .pop-x:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #f0f4ff;
      }
      .pop-tabs {
        display: flex;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0 6px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .pop-tabs::-webkit-scrollbar {
        display: none;
      }
      .pop-tab {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        letter-spacing: 0.04em;
        padding: 8px 8px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.24);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 0.18s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .pop-tab:hover {
        color: rgba(255, 255, 255, 0.6);
      }
      .pop-tab.on {
        color: #f0f4ff;
      }
      .pop-body {
        padding: 14px 15px 16px;
        max-height: 280px;
        overflow-y: auto;
        scrollbar-width: thin;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.8;
      }
      .pop-body b {
        color: rgba(255, 255, 255, 0.75);
      }
      .conn-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.025);
        margin-bottom: 3px;
        font-size: 9px;
      }
      .conn-dir {
        font-family: 'DM Mono', monospace;
        font-size: 7px;
        padding: 2px 5px;
        border-radius: 3px;
      }
      .conn-proto {
        font-family: 'DM Mono', monospace;
        font-size: 7px;
        color: rgba(255, 255, 255, 0.2);
        margin-left: auto;
        white-space: nowrap;
      }
      pre.docker-snippet {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 10px;
        font-family: 'DM Mono', monospace;
        font-size: 8.5px;
        color: rgba(255, 255, 255, 0.55);
        overflow-x: auto;
        white-space: pre;
        margin-top: 8px;
        line-height: 1.6;
      }

      /* TOOLBAR */
      .vp-toolbar {
        position: fixed;
        bottom: 68px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 400;
        display: flex;
        align-items: center;
        gap: 2px;
        background: rgba(9, 13, 26, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 4px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.03);
        user-select: none;
      }
      .vp-sep {
        width: 1px;
        height: 22px;
        background: rgba(255, 255, 255, 0.08);
        margin: 0 3px;
        flex-shrink: 0;
      }
      .vp-btn {
        font-family: 'DM Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.04em;
        padding: 6px 10px;
        border: none;
        border-radius: 7px;
        background: transparent;
        color: rgba(255, 255, 255, 0.38);
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        min-width: 32px;
        height: 30px;
        white-space: nowrap;
      }
      .vp-btn:hover {
        background: rgba(255, 255, 255, 0.07);
        color: rgba(255, 255, 255, 0.85);
      }
      .vp-btn.active {
        background: rgba(6, 255, 165, 0.14);
        color: #06ffa5;
        box-shadow: inset 0 0 0 1px rgba(6, 255, 165, 0.3);
      }
      .vp-btn.active.pan-mode {
        background: rgba(167, 139, 250, 0.14);
        color: #a78bfa;
        box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.3);
      }
      .vp-zoom-label {
        font-family: 'DM Mono', monospace;
        font-size: 9.5px;
        color: rgba(255, 255, 255, 0.48);
        min-width: 42px;
        text-align: center;
        cursor: pointer;
        padding: 6px 4px;
        border-radius: 5px;
        transition: all 0.15s;
      }
      .vp-zoom-label:hover {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.85);
      }

      /* LEGEND */
      .legend {
        position: fixed;
        bottom: 122px;
        right: 16px;
        z-index: 400;
        background: rgba(9, 13, 22, 0.93);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px;
        min-width: 175px;
      }
      .legend-title {
        font-family: 'DM Mono', monospace;
        font-size: 7.5px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.22);
        margin-bottom: 8px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
        font-size: 7.5px;
        font-family: 'DM Mono', monospace;
        color: rgba(255, 255, 255, 0.28);
      }
      .legend-line {
        width: 26px;
        height: 0;
        border-top: 2px dashed;
        opacity: 0.65;
      }

      /* ZOOM TOAST */
      #zoom-toast {
        position: fixed;
        bottom: 118px;
        left: 50%;
        transform: translateX(-50%) translateY(6px);
        background: rgba(9, 13, 26, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 7px 14px;
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        z-index: 500;
        pointer-events: none;
        opacity: 0;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      #zoom-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* KBD HINTS */
      .kbd-hint {
        position: fixed;
        bottom: 72px;
        right: 16px;
        z-index: 400;
        display: flex;
        flex-direction: column;
        gap: 4px;

  <body>

    <script>
      // ═══════════════════════════════════════════════
      // TOP-LEVEL VIEWPORT STATE
      // ═══════════════════════════════════════════════
      let vpScale = 1,
        vpX = 0,
        vpY = 0,
        curMode = 'select',
        isPanning = false
      let panStartX, panStartY, panOriginX, panOriginY
      let lastDist = null,
        lastMid = null
      const MIN_SCALE = 0.15,
        MAX_SCALE = 4
      const ZOOM_STEPS = [
        0.15, 0.25, 0.33, 0.5, 0.67, 0.75, 0.8, 0.9, 1, 1.1, 1.25, 1.5, 1.75, 2,
        2.5, 3, 4,
      ]
      const IS_TOUCH = matchMedia('(pointer:coarse)').matches

      // ═══════════════════════════════════════════════
      // FLOW COLORS — exactly 9, indexed by layer
      // ═══════════════════════════════════════════════
      const FLOW_COLORS = [
        '#00d4ff',
        '#a78bfa',
        '#06ffa5',
        '#f5c842',
        '#00e5a0',
        '#fb923c',
        '#f472b6',
        '#ffd166',
        '#38bdf8',
      ]

      // ═══════════════════════════════════════════════
      // LAYERS
      // ═══════════════════════════════════════════════
      const LAYERS = [
        { id: 'L01', name: 'DATA & INGESTION', color: '#00d4ff' },
        { id: 'L02', name: 'AI & INTELLIGENCE', color: '#a78bfa' },
        { id: 'L03', name: 'WORKFLOW & AUTOMATION', color: '#06ffa5' },
        { id: 'L04', name: 'BLOCKCHAIN & TRUST', color: '#f5c842' },
        { id: 'L05', name: 'BACKEND / API', color: '#00e5a0' },
        { id: 'L06', name: 'INTERFACE & UX', color: '#fb923c' },
        { id: 'L07', name: 'INFRA & DEPLOYMENT', color: '#f472b6' },
        { id: 'L08', name: 'DATABASE & PERSISTENCE', color: '#ffd166' },
        { id: 'L09', name: 'OBSERVABILITY', color: '#38bdf8' },
      ]

      // ═══════════════════════════════════════════════
      // NODE DATA
      // ═══════════════════════════════════════════════
      const ND = {
        indexd_insights: {
          name: 'indexd Insights Service',
          type: 'DATA INGESTION',
          layer: 'L01',
          badge: 1,
          conns: [
            {
              d: 'out',
              to: 'Event-Driven Agent Core',
              p: 'Network scoring events',
            },
            {
              d: 'out',
              to: 'Pricing & Collateral Optimizer',
              p: 'Demand signals',
            },
            {
              d: 'in',
              to: 'Sia Network Signals Adapter',
              p: 'Raw indexd feed',
            },
          ],
          summary:
            'Connects to the Sia indexd service to pull network-wide host scoring, demand signals, and competitive pricing data for the local agent to consume.',
          does: 'Polls the official Sia indexd REST API at configurable intervals (default 60s) to retrieve network-wide host performance rankings, storage demand heatmaps, and pricing benchmarks. Data is normalised into a typed event schema and emitted onto the internal event bus. Provides context that an isolated hostd instance cannot see on its own.',
          provides: `Network intelligence that allows a single Sia host to understand its relative competitive position. Without indexd, a host is flying blind — unable to know if its pricing is too high or too low versus the market.<pre class="docker-snippet">indexd-insights:
  image: siahost-agent:latest
  command: ["indexd-worker"]
  environment:
    - INDEXD_URL=https://api.sia.tech/indexd
    - POLL_INTERVAL=60s
  depends_on: [postgres]</pre>`,
          passes:
            'Normalised SiaNetwork demand-and-scoring events forwarded to <b>Event-Driven Agent Core</b> and <b>Pricing & Collateral Optimizer</b> via the internal Redis event bus.',
        },
        metrics_collector: {
          name: 'Metrics & Webhook Collector',
          type: 'DATA INGESTION',
          layer: 'L01',
          badge: 2,
          conns: [
            {
              d: 'in',
              to: 'hostd Integration Service',
              p: 'Webhook push (hostd native)',
            },
            {
              d: 'out',
              to: 'Local Persistence Store',
              p: 'Time-series metrics write',
            },
            {
              d: 'out',
              to: 'Event-Driven Agent Core',
              p: 'State change events',
            },
          ],
          summary:
            'Receives real-time metrics and webhook notifications from the local hostd process — storage utilisation, active contracts, revenue, and uptime events — and feeds them to the agent.',
          does: 'Exposes an HTTP webhook endpoint that hostd pushes to on every significant event (contract formed, storage freed, alert triggered). Also pulls periodic snapshots via the hostd REST API for metrics that are not push-emitted. All data is timestamped, validated via Pydantic v2, and persisted to TimescaleDB for trend analysis.',
          provides: `Zero-polling real-time visibility of the host's operational state. The push-webhook model means the agent reacts to hostd events in &lt;1s rather than waiting for a poll cycle.<pre class="docker-snippet">metrics-collector:
  image: siahost-agent:latest
  command: ["metrics-worker"]
  ports: ["8081:8081"]
  environment:
    - HOSTD_WEBHOOK_SECRET=\${SECRET}
    - TIMESCALE_URL=\${DB_URL}
  depends_on: [postgres]</pre>`,
          passes:
            'Raw host metrics written to <b>Local Persistence Store</b>; significant state-change events emitted to <b>Event-Driven Agent Core</b> for agentic reaction.',
        },

        // L02 — AI & INTELLIGENCE
        agent_core: {
          name: 'Event-Driven Agent Core',
          type: 'AI AGENT',
          layer: 'L02',
          badge: 3,
          conns: [
            {
              d: 'in',
              to: 'Metrics & Webhook Collector',
              p: 'State change events',
            },
            { d: 'in', to: 'indexd Insights Service', p: 'Network signals' },
            {
              d: 'out',
              to: 'Pricing & Collateral Optimizer',
              p: 'Optimization trigger',
            },
            { d: 'out', to: 'Event Orchestrator', p: 'Workflow dispatch' },
          ],
          summary:
            'The central autonomous brain — a LangGraph agent powered by Claude Sonnet 4.6 that continuously monitors host state, detects optimization opportunities, and dispatches targeted workflows.',
          does: 'Built on LangGraph with Claude Sonnet 4.6 as the reasoning core. Subscribes to all host and network events via Redis Streams. On each event, the agent assembles a context window (current host metrics, recent history from Qdrant, competitor scores from indexd) and reasons about required actions. Bound MCP tools: <b>hostd-mcp-server</b> (read host state), <b>indexd-mcp-server</b> (query network data). All inference steps traced via LangSmith.',
          provides: `Autonomous reaction to host state without human intervention. The LangGraph architecture ensures deterministic tool calling and safe rollback on failures. LangSmith traces every decision for audit.<pre class="docker-snippet">agent-core:
  image: siahost-agent:latest
  command: ["agent-worker"]
  environment:
    - ANTHROPIC_API_KEY=\${ANTHROPIC_KEY}
    - REDIS_URL=redis://redis:6379
    - LANGSMITH_API_KEY=\${LS_KEY}
  depends_on: [redis, qdrant]</pre>`,
          passes:
            'Optimization trigger signals dispatched to <b>Pricing & Collateral Optimizer</b>; complex multi-step workflows enqueued via <b>Event Orchestrator</b>.',
          mcpPackage: '@siahost/mcp-server-hostd',
          exposedTools: [
            'get_host_metrics',
            'update_host_settings',
            'list_contracts',
            'get_network_score',
          ],
          boundAgents: [
            'Event-Driven Agent Core',
            'Pricing & Collateral Optimizer',
          ],
          securityScope: 'read-write',
        },
        pricing_optimizer: {
          name: 'Pricing & Collateral Optimizer',
          type: 'AI AGENT',
          layer: 'L02',
          badge: 4,
          conns: [
            {
              d: 'in',
              to: 'Event-Driven Agent Core',
              p: 'Optimization trigger',
            },
            {
              d: 'in',
              to: 'indexd Insights Service',
              p: 'Market pricing data',
            },
            { d: 'out', to: 'Configuration Applier', p: 'New pricing params' },
            {
              d: 'out',
              to: 'Contract Health Analyzer',
              p: 'Collateral advice',
            },
          ],
          summary:
            'Dynamically calculates optimal storage pricing and collateral ratios using market signals from indexd, host performance history, and Claude Sonnet 4.6 reasoning.',
          does: 'A specialised LangGraph sub-agent invoked by the core agent. Uses Qdrant to retrieve historical pricing effectiveness data, queries indexd for current competitor rates, and applies a multi-objective optimisation: maximise revenue-per-TB while maintaining competitive ranking. Outputs a validated pricing config object. Bound MCP tool: <b>hostd-mcp-server</b> for safe config preview before apply.',
          provides: `Evidence-based pricing that adapts to market conditions daily rather than requiring manual tuning. A host using static pricing either loses contracts (too expensive) or leaves revenue on the table (too cheap).<pre class="docker-snippet">pricing-optimizer:
  image: siahost-agent:latest
  command: ["pricing-worker"]
  environment:
    - QDRANT_URL=http://qdrant:6333
    - HOSTD_API=http://hostd:9980
  depends_on: [qdrant, agent-core]</pre>`,
          passes:
            'New pricing configuration sent to <b>Configuration Applier</b> for safe, audited apply to hostd. Collateral strategy recommendations forwarded to <b>Contract Health Analyzer</b>.',
        },
        scaling_advisor: {
          name: 'Scaling Advisor',
          type: 'AI AGENT',
          layer: 'L02',
          badge: 5,
          conns: [
            {
              d: 'in',
              to: 'Local Persistence Store',
              p: 'Historical utilisation trends',
            },
            {
              d: 'in',
              to: 'Sia Network Signals Adapter',
              p: 'Network demand forecast',
            },
            {
              d: 'out',
              to: 'Alert & Notification System',
              p: 'Hardware upgrade recommendations',
            },
            {
              d: 'out',
              to: 'Impact & Reporting Service',
              p: 'Growth projections',
            },
          ],
          summary:
            'Analyses storage utilisation trends and Sia network demand forecasts to generate hardware scaling recommendations before capacity becomes a bottleneck.',
          does: 'Runs a scheduled LangGraph workflow (weekly) that ingests 90-day utilisation history from TimescaleDB, network demand signals from indexd, and current hardware specs. Claude Sonnet 4.6 reasons over this data to produce prioritised scaling recommendations: "Add 4TB by Day 60" or "Current capacity adequate for 120 days." Confidence intervals are calculated and attached.',
          provides: `Proactive hardware planning that prevents revenue loss from full-storage rejection of new contracts. Operators know months in advance when to purchase new drives, smoothing capital expenditure.<pre class="docker-snippet">scaling-advisor:
  image: siahost-agent:latest
  command: ["scaling-worker"]
  environment:
    - SCHEDULE=0 9 * * MON
    - DB_URL=\${TIMESCALE_URL}
  depends_on: [postgres, agent-core]</pre>`,
          passes:
            'Scaling recommendations pushed to <b>Alert & Notification System</b> as actionable notifications. Growth projections forwarded to <b>Impact & Reporting Service</b> for quarterly reports.',
        },

        // L03 — WORKFLOW & AUTOMATION
        event_orchestrator: {
          name: 'Event Orchestrator',
          type: 'WORKFLOW ENGINE',
          layer: 'L03',
          badge: 6,
          conns: [
            { d: 'in', to: 'Event-Driven Agent Core', p: 'Workflow dispatch' },
            { d: 'out', to: 'Configuration Applier', p: 'schedules activity' },
            { d: 'out', to: 'Recommendation Engine', p: 'triggers workflow' },
            {
              d: 'out',
              to: 'hostd Integration Service',
              p: 'dispatches activity',
            },
          ],
          summary:
            'Temporal.io-powered durable workflow engine that orchestrates multi-step optimization sequences with automatic retry, saga patterns, and exactly-once execution guarantees.',
          does: 'Hosts Temporal workflows for each optimization type: PricingUpdateWorkflow, CollateralAdjustWorkflow, OnboardingWorkflow. Each workflow is defined as a series of retryable activities: fetch → validate → preview → apply → verify. If any activity fails (network timeout, hostd rejection), Temporal replays from the last successful checkpoint. The n8n CE layer wraps external webhook triggers (cron jobs, external alerts) into Temporal workflow starts.',
          provides: `Zero-lost-update guarantees — if the VPS reboots mid-optimization, Temporal replays from history. This is critical for financial operations like collateral adjustments where partial execution is dangerous.<pre class="docker-snippet">temporal-server:
  image: temporalio/server:latest
  ports: ["7233:7233"]
  depends_on: [postgres]
temporal-worker:
  image: siahost-agent:latest
  command: ["temporal-worker"]
  environment:
    - TEMPORAL_ADDRESS=temporal-server:7233</pre>`,
          passes:
            'Scheduled activities dispatched to <b>Configuration Applier</b> and <b>hostd Integration Service</b>. Workflow completion events forwarded to <b>Recommendation Engine</b>.',
        },
        recommendation_engine: {
          name: 'Recommendation Engine',
          type: 'AUTOMATION',
          layer: 'L03',
          badge: 7,
          conns: [
            { d: 'in', to: 'Event Orchestrator', p: 'triggers workflow' },
            {
              d: 'in',
              to: 'Uptime Monitoring & Risk Detector',
              p: 'Risk signals',
            },
            {
              d: 'out',
              to: 'Alert & Notification System',
              p: 'Actionable recommendations',
            },
            { d: 'out', to: 'Unified Dashboard', p: 'Dashboard suggestions' },
          ],
          summary:
            'Generates prioritised, actionable operator recommendations from agent analysis results, workflow outcomes, and risk signals — packaged for human review.',

          summary:
            'The Sia blockchain itself — the decentralised trust layer that enforces storage contracts, proof-of-storage obligations, and collateral slashing automatically at the protocol level. No EVM, no custom contracts.',
          does: "Sia uses a custom Proof-of-Work consensus (Blake2b) where storage contracts, proof windows, and collateral are <b>first-class protocol primitives</b> — not smart contracts written by developers. The host's local hostd daemon manages all on-chain obligations autonomously: submitting storage proofs each window (~144 blocks, ~24 hrs), locking and releasing collateral, and forming contracts with renters via the Sia renter-host protocol. Average transaction fee: ~0.001 SC. Block time: ~10 minutes. Finality: ~6 blocks (~1 hour). Block explorer: https://explore.sia.tech. Chain: Sia Mainnet (v1/v2 hardfork aware). No developer-written smart contracts exist — the agent only reads outcomes and optimises inputs upstream.",

          does: 'Built with FastAPI 0.115 + Python 3.12, this service exposes typed endpoints for every hostd operation the agent needs: GET /metrics, POST /settings, GET /contracts, GET /wallet. Uses Pydantic v2 models for request/response validation. SQLAlchemy 2.0 with Alembic manages the settings-history schema. Implements write-ahead logging for all hostd mutations — every change is recorded before execution, enabling rollback.',

      // ═══════════════════════════════════════════════
      // BUILD DOM
      // ═══════════════════════════════════════════════
      function buildLanes() {
        const scrollArea = document.getElementById('scroll-area')
        // Group nodes by layer
        const byLayer = {}
        LAYERS.forEach((l) => {
          byLayer[l.id] = []
        })
        Object.entries(ND).forEach(([id, n]) => {
          byLayer[n.layer].push({ id, ...n })
        })

        LAYERS.forEach((layer, li) => {
          const nodes = byLayer[layer.id]
          const bg = hexToRgba(layer.color, 0.03)
          const row = document.createElement('div')
          row.className = 'lane-row'
          row.id = `lane-row-${layer.id}`
          row.innerHTML = `
      <div class="lane-gutter">
        <div class="lane-num" style="color:${layer.color}">${layer.id}</div>
        <div class="lane-label" style="color:${layer.color}">${layer.name}</div>
      </div>
      <div class="swimlane" style="background:${bg};border-left:3px solid ${layer.color}" id="sl-${layer.id}">
        <div class="lane-nodes" id="ln-${layer.id}"></div>
      </div>`
          scrollArea.appendChild(row)

          const laneNodes = row.querySelector(`#ln-${layer.id}`)
          nodes.forEach((n, ni) => {
            if (ni > 0) {
              const arr = document.createElement('div')
              arr.className = 'inline-arrow'
              arr.innerHTML = `<svg width="36" height="14" viewBox="0 0 36 14"><line x1="2" y1="7" x2="28" y2="7" stroke="${layer.color}" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.4"><animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.5s" repeatCount="indefinite"/></line><polygon points="28,4 34,7 28,10" fill="${layer.color}" opacity="0.4"/></svg>`
              laneNodes.appendChild(arr)
            }
            const card = document.createElement('div')
            card.className = 'fnode'
            card.id = `nd-${n.id}`
            card.style.color = layer.color
            card.innerHTML = `
        <div class="fnode-inner">
          <div class="fnode-icon" style="background:${hexToRgba(layer.color, 0.1)}">
            ${getIcon(n.id, layer.color)}
            <div class="fnode-badge" style="background:${layer.color}">${n.badge}</div>
          </div>
          <div class="fnode-name">${n.name}</div>
          <div class="fnode-type">${n.type}</div>
        </div>`
            card.addEventListener(
              IS_TOUCH ? 'touchend' : 'click',
              handleNodeClick,
            )
            laneNodes.appendChild(card)
          })
        })
      }

      function hexToRgba(hex, a) {
        const r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16)
        return `rgba(${r},${g},${b},${a})`
      }

      // ═══════════════════════════════════════════════
      // XLINK DRAWING
      // ═══════════════════════════════════════════════
      function getNodeCenter(id) {
        const el = document.getElementById(`nd-${id}`)
        if (!el) return null
        // Walk offsetParent chain to get position relative to scroll-area (canvas-local coords)
        const sa = document.getElementById('scroll-area')
        let ox = 0,
          oy = 0,
          cur = el
        while (cur && cur !== sa) {
          ox += cur.offsetLeft
          oy += cur.offsetTop
          cur = cur.offsetParent
        }
        return { x: ox + el.offsetWidth / 2, y: oy + el.offsetHeight / 2 }
      }

      function drawXLinks() {
        const svg = document.getElementById('xlink-svg')
        svg.innerHTML = ''
        XLINKS.forEach((xl, i) => {
          const s = getNodeCenter(xl.from)
          const t = getNodeCenter(xl.to)
          if (!s || !t) return
          const dx = t.x - s.x,
            dy = t.y - s.y
          const cp1x = s.x + dx * 0.4,
            cp1y = s.y
          const cp2x = t.x - dx * 0.4,
            cp2y = t.y
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
          g.className = 'xconn-group'
          g.id = `xl-${i}`
          const path = document.createElementNS(
            'http://www.w3.org/2000/svg',
            'path',
          )
          path.setAttribute(
            'd',
            `M${s.x},${s.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${t.x},${t.y}`,
          )
          path.setAttribute('stroke', xl.color)
          path.className.baseVal = 'xconn'
          g.appendChild(path)
          // Arrow tip
          const ang = Math.atan2(t.y - cp2y, t.x - cp2x)
          const al = 8
          const ax = t.x - al * Math.cos(ang),
            ay = t.y - al * Math.sin(ang)
          const arrow = document.createElementNS(
            'http://www.w3.org/2000/svg',
            'polygon',
          )
          const pts = [
            [t.x, t.y],
            [ax - 3 * Math.sin(ang), ay + 3 * Math.cos(ang)],
            [ax + 3 * Math.sin(ang), ay - 3 * Math.cos(ang)],
          ]
            .map((p) => p.join(','))
            .join(' ')
          arrow.setAttribute('points', pts)
          arrow.setAttribute('fill', xl.color)
          arrow.setAttribute('opacity', '0.22')
          arrow.id = `xl-arrow-${i}`
          g.appendChild(arrow)
          // Label
          const mx = (s.x + t.x) / 2,
            my = (s.y + t.y) / 2
          const lbg = document.createElementNS(
            'http://www.w3.org/2000/svg',
            'rect',
          )
          lbg.setAttribute('x', mx - xl.label.length * 2.8 - 4)
          lbg.setAttribute('y', my - 8)
          lbg.setAttribute('width', xl.label.length * 5.6 + 8)
          lbg.setAttribute('height', 14)
          lbg.setAttribute('rx', '3')
          lbg.setAttribute('fill', 'rgba(7,10,16,0.85)')
          lbg.setAttribute('stroke', xl.color)
          lbg.setAttribute('stroke-width', '0.5')
          lbg.className.baseVal = 'xconn-label-bg'
          g.appendChild(lbg)
          const lt = document.createElementNS(
            'http://www.w3.org/2000/svg',
            'text',
          )
          lt.setAttribute('x', mx)
          lt.setAttribute('y', my + 1)
          lt.setAttribute('text-anchor', 'middle')
          lt.setAttribute('dominant-baseline', 'middle')
          lt.setAttribute('fill', xl.color)
          lt.className.baseVal = 'xconn-label'
          lt.textContent = xl.label
          g.appendChild(lt)
          svg.appendChild(g)
        })
      }

      // ═══════════════════════════════════════════════
      // VIEWPORT
      // ═══════════════════════════════════════════════
      function applyVP() {
        document.getElementById('canvas-root').style.transform =
          `translate(${vpX}px,${vpY}px) scale(${vpScale})`
        document.getElementById('zoom-label').textContent =
          Math.round(vpScale * 100) + '%'
        updateTether()
      }

      function zoomAt(cx, cy, nscale) {
        const clamped = Math.max(MIN_SCALE, Math.min(MAX_SCALE, nscale))
        const ratio = clamped / vpScale
        vpX = cx - (cx - vpX) * ratio
        vpY = cy - (cy - vpY) * ratio
        vpScale = clamped
        applyVP()
        showZoomToast()
      }

      function zoomStep(dir) {
        const stage = document.getElementById('stage')
        const cx = stage.offsetWidth / 2,
          cy = stage.offsetHeight / 2
        let idx = ZOOM_STEPS.findIndex((z) => z >= vpScale)
        if (idx < 0) idx = ZOOM_STEPS.length - 1
        if (dir > 0) idx = Math.min(ZOOM_STEPS.length - 1, idx + 1)
        else idx = Math.max(0, idx - 1)
        zoomAt(cx, cy, ZOOM_STEPS[idx])
      }

      function zoomToFit() {
        const stage = document.getElementById('stage')
        const sa = document.getElementById('scroll-area')
        const sw = stage.offsetWidth,
          sh = stage.offsetHeight
        const cw = sa.scrollWidth,
          ch = sa.scrollHeight
        const scale = Math.min(sw / cw, sh / ch) * 0.92
        vpScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale))
        vpX = (sw - cw * vpScale) / 2
        vpY = (sh - ch * vpScale) / 2
        applyVP()
      }

      function zoomTo100() {
        vpScale = 1
        vpX = 40
        vpY = 20
        applyVP()
      }

      let zoomToastTimer = null
      function showZoomToast() {
        const t = document.getElementById('zoom-toast')
        t.textContent = Math.round(vpScale * 100) + '%'
        t.classList.add('show')
        clearTimeout(zoomToastTimer)
        zoomToastTimer = setTimeout(() => t.classList.remove('show'), 900)
      }

      function setMode(m) {
        curMode = m
        const stage = document.getElementById('stage')
        stage.className = m === 'pan' ? 'mode-pan' : 'mode-select'
        document
          .getElementById('btn-select')
          .classList.toggle('active', m === 'select')
        document
          .getElementById('btn-pan')
          .classList.toggle('active', m === 'pan')
        document
          .getElementById('btn-pan')
          .classList.toggle('pan-mode', m === 'pan')
      }

      // ═══════════════════════════════════════════════
      // MOUSE EVENTS
      // ═══════════════════════════════════════════════
      let mouseDownOnNode = false
      let dragDist = 0
      let mdX = 0,
        mdY = 0

      document.getElementById('stage').addEventListener('mousedown', (e) => {
        if (e.target.closest('.fnode')) {
          mouseDownOnNode = true
          mdX = e.clientX
          mdY = e.clientY
          dragDist = 0
          return
        }
        mouseDownOnNode = false
        if (curMode === 'pan' || e.button === 1) {
          isPanning = true
          panStartX = e.clientX
          panStartY = e.clientY
          panOriginX = vpX
          panOriginY = vpY
          document.getElementById('stage').classList.add('panning')
        }
      })
      document.addEventListener('mousemove', (e) => {
        if (mouseDownOnNode) {
          dragDist += Math.abs(e.clientX - mdX) + Math.abs(e.clientY - mdY)
          mdX = e.clientX
          mdY = e.clientY
          return
        }
        if (!isPanning) return
        vpX = panOriginX + (e.clientX - panStartX)
        vpY = panOriginY + (e.clientY - panStartY)
        applyVP()
        drawXLinks()
      })
      document.addEventListener('mouseup', (e) => {
        isPanning = false
        document.getElementById('stage').classList.remove('panning')
        mouseDownOnNode = false
      })
      document.getElementById('stage').addEventListener(
        'wheel',
        (e) => {
          e.preventDefault()
          const rect = document.getElementById('stage').getBoundingClientRect()
          zoomAt(
            e.clientX - rect.left,
            e.clientY - rect.top,
            vpScale * (1 - e.deltaY * 0.001),
          )
          drawXLinks()
        },
        { passive: false },
      )
      document.addEventListener('keydown', (e) => {
        if (e.key === 'v' || e.key === 'V') setMode('select')
        if (e.key === 'h' || e.key === 'H') setMode('pan')
        if (e.key === ' ') {
          e.preventDefault()
          zoomToFit()
        }
        if (e.key === '-') zoomStep(-1)
        if (e.key === '=' || e.key === '+') zoomStep(1)
      })

      // ═══════════════════════════════════════════════
      // TOUCH EVENTS
      // ═══════════════════════════════════════════════
      function getTouchById(list, id) {
        for (let t of list) if (t.identifier === id) return t
        return null
      }
      let t0id = null
      document.getElementById('stage').addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault()
          if (e.touches.length === 1) {
            const t = e.touches[0]
            t0id = t.identifier
            panStartX = t.clientX
            panStartY = t.clientY
            panOriginX = vpX
            panOriginY = vpY
            isPanning = true
            lastDist = null
            lastMid = null
          } else if (e.touches.length === 2) {
            const t1 = e.touches[0],
              t2 = e.touches[1]
            lastDist = Math.hypot(
              t2.clientX - t1.clientX,
              t2.clientY - t1.clientY,
            )
            lastMid = {
              x: (t1.clientX + t2.clientX) / 2,
              y: (t1.clientY + t2.clientY) / 2,
            }
            isPanning = false
          }
        },
        { passive: false },
      )
      document.getElementById('stage').addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault()
          if (e.touches.length === 1 && isPanning) {
            const t = getTouchById(e.touches, t0id) || e.touches[0]
            const dx = t.clientX - panStartX,
              dy = t.clientY - panStartY
            vpX = panOriginX + dx
            vpY = panOriginY + dy
            applyVP()
            drawXLinks()
          } else if (e.touches.length === 2 && lastDist !== null) {
            const t1 = e.touches[0],
              t2 = e.touches[1]
            const dist = Math.hypot(
              t2.clientX - t1.clientX,
              t2.clientY - t1.clientY,
            )
            const mid = {
              x: (t1.clientX + t2.clientX) / 2,
              y: (t1.clientY + t2.clientY) / 2,
            }
            const rect = document
              .getElementById('stage')
              .getBoundingClientRect()
            zoomAt(
              mid.x - rect.left,
              mid.y - rect.top,
              vpScale * (dist / lastDist),
            )
            lastDist = dist
            lastMid = mid
            drawXLinks()
          }
        },
        { passive: false },
      )
      document.getElementById('stage').addEventListener(
        'touchend',
        (e) => {
          if (e.touches.length === 0) {
            isPanning = false
            lastDist = null
            lastMid = null
          }
          if (e.changedTouches.length === 1 && e.touches.length === 0) {
            // tap detection handled by handleNodeClick
          }
        },
        { passive: false },
      )
      document.getElementById('stage').addEventListener('touchcancel', () => {
        isPanning = false
        lastDist = null
        lastMid = null
      })
      // Show touch hint
      if (IS_TOUCH) {
        const th = document.getElementById('touch-hint')
        th.classList.add('show')
        setTimeout(() => th.classList.remove('show'), 3500)
      }

      // ═══════════════════════════════════════════════
      // POPOVER SYSTEM
      // ═══════════════════════════════════════════════
      let activeNode = null,
        currentPop = null,
        popDragging = false
      let popDx = 0,
        popDy = 0,
        popStartL = 0,
        popStartT = 0

      const TABS = ['summary', 'does', 'provides', 'passes', 'connections']
      const TNAMES = [
        'Overview',
        'What It Does',
        'What It Provides',
        'What It Passes On',
        'Connections',
      ]

      function positionPop(nodeEl, pop) {
        const PW = 364,
          PH = 400,
          M = 12
        const r = nodeEl.getBoundingClientRect()
        const vw = window.innerWidth,
          vh = window.innerHeight
        let left, top
        if (vh - r.bottom - M >= PH || vh - r.bottom >= r.top - 52) {
          top = r.bottom + M
          left = (r.left + r.right) / 2 - PW / 2
        } else if (r.top - 52 - M >= PH) {
          top = r.top - PH - M
          left = (r.left + r.right) / 2 - PW / 2
        } else if (vw - r.right - M >= PW) {
          left = r.right + M
          top = r.top + r.height / 2 - PH / 2
        } else {
          left = r.left - PW - M
          top = r.top + r.height / 2 - PH / 2
        }
        pop.style.left = Math.max(8, Math.min(vw - PW - 8, left)) + 'px'
        pop.style.top = Math.max(60, Math.min(vh - PH - 64, top)) + 'px'
      }

      function getLayerColor(layerId) {
        return LAYERS.find((l) => l.id === layerId)?.color || '#06ffa5'
      }

      function buildPopContent(data, tab) {
        if (tab === 'connections') {
          const conns = data.conns || []
          if (!conns.length)
            return '<span style="opacity:0.4">No connections defined.</span>'
          return conns
            .map((c) => {
              const dir = c.d === 'out' ? '→' : '←'
              const dircol = c.d === 'out' ? '#06ffa5' : '#fb923c'
              return `<div class="conn-row"><span class="conn-dir" style="color:${dircol};background:${hexToRgba(dircol, 0.12)}">${dir} ${c.d.toUpperCase()}</span><span>${c.to}</span><span class="conn-proto">${c.p}</span></div>`
            })
            .join('')
        }
        return `<p style="margin:0">${data[tab] || '—'}</p>`
      }

      function highlightNodeLinks(nodeId) {
        XLINKS.forEach((xl, i) => {
          const g = document.getElementById('xl-' + i)
          const path = g ? g.querySelector('.xconn') : null
          const arrow = document.getElementById('xl-arrow-' + i)
          if (!g || !path) return
          if (xl.from === nodeId || xl.to === nodeId) {
            path.classList.add('active')
            path.classList.remove('dimmed')
            if (arrow) arrow.setAttribute('opacity', '0.9')
          } else {
            path.classList.remove('active')
            path.classList.add('dimmed')
            if (arrow) arrow.setAttribute('opacity', '0.04')
          }
        })
        Object.keys(ND).forEach((id) => {
          if (id === nodeId) return
          const connected = XLINKS.some(
            (xl) =>
              (xl.from === nodeId && xl.to === id) ||
              (xl.to === nodeId && xl.from === id),
          )
          const el = document.getElementById('nd-' + id)
          if (!el) return
          el.style.opacity = connected ? '0.65' : '0.18'
        })
      }

      function clearNodeHighlight() {
        XLINKS.forEach((xl, i) => {
          const g = document.getElementById('xl-' + i)
          const path = g ? g.querySelector('.xconn') : null
          const arrow = document.getElementById('xl-arrow-' + i)
          if (!path) return
          path.classList.remove('active', 'dimmed')
          if (arrow) arrow.setAttribute('opacity', '0.22')
        })
        Object.keys(ND).forEach((id) => {
          const el = document.getElementById('nd-' + id)
          if (el) {
            el.classList.remove('dimmed')
            el.style.opacity = ''
          }
        })
      }

      function openNode(nodeId) {
        closePop()
        const data = ND[nodeId]
        if (!data) return
        const nodeEl = document.getElementById('nd-' + nodeId)
        const color = getLayerColor(data.layer)
        activeNode = nodeId
        nodeEl.classList.add('active')
        nodeEl.style.opacity = ''
        highlightNodeLinks(nodeId)

        const pop = document.createElement('div')
        pop.className = 'popover'
        pop.id = 'main-pop'
        pop.style.width = '364px'
        pop.dataset.tab = 'summary'

        pop.innerHTML = `
    <div class="pop-header" id="pop-hdr">
      <div class="pop-drag-hint"></div>
      <div class="pop-header-inner">
        <div class="pop-ico" style="background:${hexToRgba(color, 0.12)}">${getIcon(nodeId, color)}</div>
        <div>
          <div class="pop-nm">${data.name}</div>
          <div class="pop-tp" style="color:${color}">${data.type} · ${data.layer}</div>
        </div>
        <button class="pop-x" onclick="closePop()">✕</button>
      </div>
    </div>
    <div class="pop-tabs" id="pop-tabs">
      ${TNAMES.map((n, i) => `<div class="pop-tab${i === 0 ? ' on' : ''}" onclick="switchTab('${TABS[i]}')" id="ptab-${TABS[i]}" style="${i === 0 ? 'border-bottom-color:' + color + ';color:#f0f4ff' : ''}">${n}</div>`).join('')}
    </div>
    <div class="pop-body" id="pop-body">${buildPopContent(data, 'summary')}</div>`

        document.body.appendChild(pop)
        currentPop = pop
        positionPop(nodeEl, pop)
        createTether(color, nodeEl)
        makeDraggable(pop)
      }

      function switchTab(tab) {
        if (!currentPop || !activeNode) return
        const data = ND[activeNode]
        document.getElementById('pop-body').innerHTML = buildPopContent(
          data,
          tab,
        )
        currentPop.dataset.tab = tab
        const color = getLayerColor(data.layer)
        TABS.forEach((t, i) => {
          const el = document.getElementById(`ptab-${t}`)
          if (!el) return
          if (t === tab) {
            el.classList.add('on')
            el.style.borderBottomColor = color
            el.style.color = '#f0f4ff'
          } else {
            el.classList.remove('on')
            el.style.borderBottomColor = 'transparent'
            el.style.color = ''
          }
        })
      }

      function closePop() {
        if (currentPop) {
          currentPop.remove()
          currentPop = null
        }
        if (activeNode) {
          const el = document.getElementById('nd-' + activeNode)
          if (el) {
            el.classList.remove('active')
            el.style.opacity = ''
          }
          activeNode = null
        }
        clearNodeHighlight()
        removeTether()
      }

      // ═══════════════════════════════════════════════
      // TETHER
      // ═══════════════════════════════════════════════
      let tetherAnimId = null
      function createTether(color, nodeEl) {
        updateTether()
      }
      function updateTether() {
        const svg = document.getElementById('pop-tether')
        svg.innerHTML = ''
        if (!activeNode || !currentPop) return
        const nodeEl = document.getElementById(`nd-${activeNode}`)
        if (!nodeEl) return
        const nr = nodeEl.getBoundingClientRect()
        const pr = currentPop.getBoundingClientRect()
        const nx = (nr.left + nr.right) / 2,
          ny = (nr.top + nr.bottom) / 2
        const px = (pr.left + pr.right) / 2
        const py =
          ny < pr.top
            ? pr.top
            : ny > pr.bottom
              ? pr.bottom
              : (pr.top + pr.bottom) / 2
        const color = getLayerColor(ND[activeNode]?.layer || 'L01')
        const id = 'tg' + Date.now()
        const grad = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'linearGradient',
        )
        grad.setAttribute('id', id)
        grad.setAttribute('x1', '0%')
        grad.setAttribute('y1', '0%')
        grad.setAttribute('x2', '100%')
        grad.setAttribute('y2', '0%')
        const s1 = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'stop',
        )
        s1.setAttribute('offset', '0%')
        s1.setAttribute('stop-color', color)
        s1.setAttribute('stop-opacity', '0.7')
        const s2 = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'stop',
        )
        s2.setAttribute('offset', '100%')
        s2.setAttribute('stop-color', color)
        s2.setAttribute('stop-opacity', '0.2')
        grad.appendChild(s1)
        grad.appendChild(s2)
        const defs = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'defs',
        )
        defs.appendChild(grad)
        svg.appendChild(defs)
        const cp1x = nx + (px - nx) * 0.4,
          cp1y = ny,
          cp2x = px - (px - nx) * 0.4,
          cp2y = py
        const path = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'path',
        )
        path.setAttribute(
          'd',
          `M${nx},${ny} C${cp1x},${cp1y} ${cp2x},${cp2y} ${px},${py}`,
        )
        path.setAttribute('fill', 'none')
        path.setAttribute('stroke', `url(#${id})`)
        path.setAttribute('stroke-width', '1.5')
        path.setAttribute('stroke-dasharray', '5 3')
        path.style.animation = 'dash-travel 2s linear infinite'
        svg.appendChild(path)
        const dot = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'circle',
        )
        dot.setAttribute('cx', nx)
        dot.setAttribute('cy', ny)
        dot.setAttribute('r', '3')
        dot.setAttribute('fill', color)
        dot.setAttribute('opacity', '0.8')
        svg.appendChild(dot)
      }
      function removeTether() {
        document.getElementById('pop-tether').innerHTML = ''
      }

      // ═══════════════════════════════════════════════
      // DRAGGABLE POPOVER
      // ═══════════════════════════════════════════════
      function makeDraggable(pop) {
        const hdr = pop.querySelector('#pop-hdr')
        hdr.addEventListener('mousedown', (e) => {
          if (e.target.closest('.pop-x')) return
          popDragging = true
          pop.classList.add('dragging')
          popDx = e.clientX - parseInt(pop.style.left || 0)
          popDy = e.clientY - parseInt(pop.style.top || 0)
          e.preventDefault()
        })
        hdr.addEventListener(
          'touchstart',
          (e) => {
            if (e.target.closest('.pop-x')) return
            const t = e.touches[0]
            popDragging = true
            pop.classList.add('dragging')
            popDx = t.clientX - parseInt(pop.style.left || 0)
            popDy = t.clientY - parseInt(pop.style.top || 0)
            e.stopPropagation()
          },
          { passive: false },
        )
        document.addEventListener('mousemove', onPopDrag)
        document.addEventListener('touchmove', onPopTouchDrag, {
          passive: false,
        })
        document.addEventListener('mouseup', stopPopDrag)
        document.addEventListener('touchend', stopPopDrag)
      }
      function onPopDrag(e) {
        if (!popDragging || !currentPop) return
        const vw = window.innerWidth,
          vh = window.innerHeight
        const PW = parseInt(currentPop.style.width || 364)
        const PH = currentPop.offsetHeight || 400
        const left = Math.max(8, Math.min(vw - PW - 8, e.clientX - popDx))
        const top = Math.max(60, Math.min(vh - PH - 64, e.clientY - popDy))
        currentPop.style.left = left + 'px'
        currentPop.style.top = top + 'px'
        updateTether()
      }
      function onPopTouchDrag(e) {
        if (!popDragging || !currentPop) return
        e.preventDefault()
        const t = e.touches[0]
        const vw = window.innerWidth,
          vh = window.innerHeight
        const PW = parseInt(currentPop.style.width || 364)
        const PH = currentPop.offsetHeight || 400
        const left = Math.max(8, Math.min(vw - PW - 8, t.clientX - popDx))
        const top = Math.max(60, Math.min(vh - PH - 64, t.clientY - popDy))
        currentPop.style.left = left + 'px'
        currentPop.style.top = top + 'px'
        updateTether()
      }
      function stopPopDrag() {
        if (!popDragging) return
        popDragging = false
        currentPop?.classList.remove('dragging')
      }

      // ═══════════════════════════════════════════════
      // NODE CLICK
      // ═══════════════════════════════════════════════
      function handleNodeClick(e) {
        if (IS_TOUCH && e.type === 'touchend') {
          const t = e.changedTouches[0]
          const el = document.elementFromPoint(t.clientX, t.clientY)
          const node = el?.closest('.fnode')
          if (!node) return
          const id = node.id.replace('nd-', '')
          if (isPlaying) {
            togglePlay()
          }
          openNode(id)
          return
        }
        if (dragDist > 8) return
        const node = e.currentTarget
        const id = node.id.replace('nd-', '')
        if (isPlaying) {
          togglePlay()
        }
        openNode(id)
      }

      // Close popover when clicking stage bg
      document.getElementById('stage').addEventListener('click', (e) => {
        if (!e.target.closest('.fnode') && !e.target.closest('.popover'))
          closePop()
      })

      // ═══════════════════════════════════════════════
      // FLOW ANIMATION
      // ═══════════════════════════════════════════════
      let isPlaying = false,
        currentStep = -1,
        flowTimer = null
      const FLOW_DURATION = 2800

      function buildFlowTray() {
        const tray = document.getElementById('flow-tray')
        FLOW_STEPS.forEach((s, i) => {
          const chip = document.createElement('div')
          chip.className = 'f-chip'
          chip.id = `chip-${i}`
          chip.textContent = s.label
          chip.onclick = () => jumpToStep(i)
          tray.appendChild(chip)
        })
      }

      function jumpToStep(idx) {
        if (isPlaying) stopPlay()
        activateStep(idx)
      }

      function activateStep(idx) {
        currentStep = idx
        const step = FLOW_STEPS[idx]
        const color = FLOW_COLORS[idx]
        const activeNodeSet = new Set(step.nodes)

        // Clear any inline opacity overrides from node-click highlighting
        Object.keys(ND).forEach((id) => {
          const el = document.getElementById('nd-' + id)
          if (el) el.style.opacity = ''
        })

        // Dim all nodes, then light active ones
        Object.keys(ND).forEach((id) => {
          const el = document.getElementById('nd-' + id)
          if (el) {
            el.classList.remove('lit')
            el.classList.add('dimmed')
          }
        })
        step.nodes.forEach((id) => {
          const el = document.getElementById('nd-' + id)
          if (el) {
            el.classList.remove('dimmed')
            el.classList.add('lit')
          }
        })

        // Light up ALL xlinks where at least one endpoint is an active node
        XLINKS.forEach((xl, i) => {
          const g = document.getElementById('xl-' + i)
          const path = g ? g.querySelector('.xconn') : null
          const arr = document.getElementById('xl-arrow-' + i)
          if (!g || !path) return
          const isActive =
            activeNodeSet.has(xl.from) || activeNodeSet.has(xl.to)
          if (isActive) {
            path.classList.add('active')
            path.classList.remove('dimmed')
            path.setAttribute('stroke', color)
            if (arr) {
              arr.setAttribute('fill', color)
              arr.setAttribute('opacity', '0.9')
            }
          } else {
            path.classList.remove('active')
            path.classList.add('dimmed')
            // Restore original color for dimmed links
            path.setAttribute('stroke', xl.color)
            if (arr) {
              arr.setAttribute('fill', xl.color)
              arr.setAttribute('opacity', '0.04')
            }
          }
        })

        // Chips
        document.querySelectorAll('.f-chip').forEach((c, i) => {
          if (i === idx) {
            c.classList.add('on')
            c.style.background = hexToRgba(color, 0.12)
            c.style.color = color
            c.style.borderColor = hexToRgba(color, 0.35)
            c.style.boxShadow = '0 0 12px ' + hexToRgba(color, 0.2)
          } else {
            c.classList.remove('on')
            c.style.background = ''
            c.style.color = ''
            c.style.borderColor = ''
            c.style.boxShadow = ''
          }
        })

        // Launch packets on all active links
        const activeLinks = XLINKS.reduce((acc, xl, i) => {
          if (activeNodeSet.has(xl.from) || activeNodeSet.has(xl.to))
            acc.push(i)
          return acc
        }, [])
        activeLinks.forEach((li, i) => {
          setTimeout(() => animPkt(li, color), i * 320)
        })
      }

      function togglePlay() {
        if (isPlaying) stopPlay()
        else startPlay()
      }

      function startPlay() {
        isPlaying = true
        document.getElementById('play-btn').textContent = '⏸ Pause'
        document.getElementById('play-btn').classList.add('playing')
        const nextStep = () => {
          currentStep = (currentStep + 1) % FLOW_STEPS.length
          activateStep(currentStep)
          flowTimer = setTimeout(nextStep, FLOW_DURATION)
        }
        nextStep()
      }

      function stopPlay() {
        isPlaying = false
        clearTimeout(flowTimer)
        document.getElementById('play-btn').textContent = '▶ Play Flow'
        document.getElementById('play-btn').classList.remove('playing')
      }

      // ═══════════════════════════════════════════════
      // PACKETS
      // ═══════════════════════════════════════════════
      function animPkt(xlIdx, color) {
        const xl = XLINKS[xlIdx]
        if (!xl) return
        const s = getNodeViewportCenter(xl.from)
        const t = getNodeViewportCenter(xl.to)
        if (!s || !t) return
        const pkt = document.createElement('div')
        pkt.className = 'pkt'
        pkt.style.background = color
        pkt.style.boxShadow = `0 0 6px ${color},0 0 12px ${hexToRgba(color, 0.5)}`
        pkt.style.opacity = '0'
        pkt.style.width = '9px'
        pkt.style.height = '9px'
        document.body.appendChild(pkt)
        const dur = 1200
        let start = null
        const cp1x = s.x + (t.x - s.x) * 0.4,
          cp1y = s.y
        const cp2x = t.x - (t.x - s.x) * 0.4,
          cp2y = t.y
        function step(ts) {
          if (!start) start = ts
          const p = Math.min((ts - start) / dur, 1)
          const ep = p < 0.5 ? 2 * p * p : 1 - (-2 * p + 2) ** 2 / 2
          const x = cubicBezier(ep, s.x, cp1x, cp2x, t.x)
          const y = cubicBezier(ep, s.y, cp1y, cp2y, t.y)
          pkt.style.left = x - 4.5 + 'px'
          pkt.style.top = y - 4.5 + 'px'
          pkt.style.opacity = p < 0.1 ? p * 10 : p > 0.9 ? (1 - p) * 10 : 1
          if (p < 1) requestAnimationFrame(step)
          else pkt.remove()
        }
        requestAnimationFrame(step)
      }
      function cubicBezier(t, p0, p1, p2, p3) {
        return (
          (1 - t) ** 3 * p0 +
          3 * (1 - t) ** 2 * t * p1 +
          3 * (1 - t) * t ** 2 * p2 +
          t ** 3 * p3
        )
      }

      function getNodeViewportCenter(id) {
        const el = document.getElementById(`nd-${id}`)
        if (!el) return null
        const r = el.getBoundingClientRect()
        return { x: (r.left + r.right) / 2, y: (r.top + r.bottom) / 2 }
      }

      // ═══════════════════════════════════════════════
      // THEME
      // ═══════════════════════════════════════════════
      let isDark = true
      function toggleTheme() {
        isDark = !isDark
        document.body.classList.toggle('light', !isDark)
        document.querySelector('.ctrl-theme').textContent = isDark ? '🌙' : '☀️'
      }

      // ═══════════════════════════════════════════════
      // RESET
      // ═══════════════════════════════════════════════
      function resetAll() {
        stopPlay()
        closePop()
        Object.keys(ND).forEach((id) => {
          const el = document.getElementById('nd-' + id)
          if (el) {
            el.classList.remove('lit', 'dimmed')
            el.style.opacity = ''
          }
        })
        XLINKS.forEach((xl, i) => {
          const g = document.getElementById('xl-' + i)
          const path = g ? g.querySelector('.xconn') : null
          const arr = document.getElementById('xl-arrow-' + i)
          if (path) {
            path.classList.remove('active', 'dimmed')
            path.setAttribute('stroke', xl.color)
          }
          if (arr) {
            arr.setAttribute('fill', xl.color)
            arr.setAttribute('opacity', '0.22')
          }
        })
        document.querySelectorAll('.f-chip').forEach((c) => {
          c.classList.remove('on')
          c.style.background = ''
          c.style.color = ''
          c.style.borderColor = ''
          c.style.boxShadow = ''
        })
        zoomToFit()
      }

      // ═══════════════════════════════════════════════
      // LEGEND
      // ═══════════════════════════════════════════════
      function buildLegend() {
        const cont = document.getElementById('legend-rows')
        LAYERS.forEach((l) => {
          const row = document.createElement('div')
          row.className = 'legend-row'
          row.innerHTML = `<div class="legend-line" style="border-top-color:${l.color}"></div><span>${l.name}</span>`
          cont.appendChild(row)
        })
      }

      // ═══════════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════════
      window.addEventListener('DOMContentLoaded', () => {
        buildLanes()
        buildFlowTray()
        buildLegend()
        requestAnimationFrame(() => {
          drawXLinks()
          zoomToFit()
        })
      })
      window.addEventListener('resize', () => {
        drawXLinks()
        updateTether()
      })
    </script>
  </body>
</html>
